name: Android Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: android-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Android App
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ORCA_ANDROID_DEPS_ROOT: ${{ github.workspace }}/.android-native-deps/install
      ORCA_ANDROID_DEPS_SRC_ROOT: ${{ github.workspace }}/.android-native-deps/src

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make verification scripts executable
        run: |
          chmod +x android-app/gradlew
          chmod +x scripts/verify_android.sh
          chmod +x scripts/verify_stub_inventory.py

      - name: Validate native stub inventory
        run: scripts/verify_android.sh stubs

      - name: Run verification script syntax checks
        run: scripts/verify_android.sh script-tests

      - name: Run JVM unit tests
        working-directory: android-app
        run: ./gradlew testDebugUnitTest

      - name: Run Android debug lint
        working-directory: android-app
        run: ./gradlew lintDebug

      - name: Cache Android native dependencies
        uses: actions/cache@v4
        with:
          path: |
            .android-native-deps/install
            .android-native-deps/src
            engine-wrapper/orca-android-libslic3r/android-deps-build
          key: android-native-deps-${{ runner.os }}-arm64-v1-${{ hashFiles('engine-wrapper/orca-android-libslic3r/build-android-deps.sh') }}

      - name: Build Android native dependencies
        run: engine-wrapper/orca-android-libslic3r/build-android-deps.sh

      - name: Assemble debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug

      - name: Run release compile and vital lint
        working-directory: android-app
        run: ./gradlew compileReleaseKotlin lintVitalRelease
