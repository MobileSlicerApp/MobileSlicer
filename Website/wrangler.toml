name = "mobileslicer"
compatibility_date = "2026-04-25"
pages_build_output_dir = "."

[vars]
SITE_DOMAIN = "mobileslicer.com"

[[d1_databases]]
binding = "BETA_DB"
database_name = "mobileslicer_beta"
database_id = "REPLACE_WITH_CLOUDFLARE_D1_DATABASE_ID"

[[r2_buckets]]
binding = "APK_BUCKET"
bucket_name = "mobileslicer-beta"

[[r2_buckets]]
binding = "FEEDBACK_BUCKET"
bucket_name = "mobileslicer-feedback"
